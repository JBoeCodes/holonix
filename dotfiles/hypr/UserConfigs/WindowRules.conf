# User window rules for jboe's desktop

# 1Password
windowrule {
    name = 1password-float
    float = on
    match:class = ^(1Password)$
}
windowrule {
    name = 1password-center
    center = on
    match:class = ^(1Password)$
}
windowrule {
    name = 1password-qa-float
    float = on
    match:title = ^(Quick Access — 1Password)$
}
windowrule {
    name = 1password-qa-stayfocused
    stay_focused = on
    match:title = ^(Quick Access — 1Password)$
}

# Vivaldi idle inhibit for fullscreen video
windowrule {
    name = vivaldi-idleinhibit
    idle_inhibit = fullscreen
    match:class = ^(vivaldi)$
}
