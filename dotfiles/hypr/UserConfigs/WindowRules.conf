# User window rules for jboe's desktop

# 1Password
windowrule {
    name = 1password-float
    float = on
    match:class = ^(1Password)$
}
windowrule {
    name = 1password-center
    center = on
    match:class = ^(1Password)$
}
windowrule {
    name = 1password-qa-float
    float = on
    match:title = ^(Quick Access — 1Password)$
}
windowrule {
    name = 1password-qa-stayfocused
    stay_focused = on
    match:title = ^(Quick Access — 1Password)$
}

# Lazygit scratchpad
windowrule {
    name = lazygit-workspace
    workspace = special:lazygit
    match:class = ^(lazygit-scratch)$
}
windowrule {
    name = lazygit-float
    float = on
    match:class = ^(lazygit-scratch)$
}
windowrule {
    name = lazygit-size
    size = 85% 80%
    match:class = ^(lazygit-scratch)$
}
windowrule {
    name = lazygit-center
    center = on
    match:class = ^(lazygit-scratch)$
}

# Btop scratchpad
windowrule {
    name = btop-workspace
    workspace = special:btop
    match:class = ^(btop-scratch)$
}
windowrule {
    name = btop-float
    float = on
    match:class = ^(btop-scratch)$
}
windowrule {
    name = btop-size
    size = 75% 70%
    match:class = ^(btop-scratch)$
}
windowrule {
    name = btop-center
    center = on
    match:class = ^(btop-scratch)$
}

# Vivaldi idle inhibit for fullscreen video
windowrule {
    name = vivaldi-idleinhibit
    idle_inhibit = fullscreen
    match:class = ^(vivaldi)$
}
