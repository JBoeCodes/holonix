# User keybind overrides
# Add custom keybinds here — they are sourced after configs/Keybinds.conf

# ── Remove conflicting KoolDots binds ──
# Unbind Super+H (was: help/cheat sheet — moved to Super+/)
unbind = $mainMod, H
# Unbind Super+J/K (was: master layout cycle — not using master layout)
unbind = $mainMod, J
unbind = $mainMod, K
# Unbind Super+Ctrl+H (was: move out of group)
unbind = $mainMod CTRL, H
# Unbind Super+Ctrl+K (was: move into group left)
unbind = $mainMod CTRL, K
# Unbind Super+Ctrl+L (was: move into group right)
unbind = $mainMod CTRL, L
# Unbind Super+Shift+H (was: toggle mute active window)
unbind = $mainMod SHIFT, H
# Unbind Super+Shift+K (was: search keybinds)
unbind = $mainMod SHIFT, K

# ── Relocated binds ──
bindd = $mainMod, slash, help / cheat sheet, exec, $scriptsDir/KeyHints.sh

# Toggle split direction (moved from Super+Shift+I to Super+Ctrl+I)
unbind = $mainMod SHIFT, I
bindd = $mainMod CTRL, I, toggle split (dwindle), layoutmsg, togglesplit

# ── Vim-style HJKL window management ──
# Focus windows
bindd = $mainMod, H, focus left, movefocus, l
bindd = $mainMod, J, focus down, movefocus, d
bindd = $mainMod, K, focus up, movefocus, u
bindd = $mainMod, L, focus right, movefocus, r

# Move windows
bindd = $mainMod CTRL, H, move window left, movewindow, l
bindd = $mainMod CTRL, J, move window down, movewindow, d
bindd = $mainMod CTRL, K, move window up, movewindow, u
bindd = $mainMod CTRL, L, move window right, movewindow, r

# Resize windows
binded = $mainMod SHIFT, H, resize left (-50), resizeactive, -50 0
binded = $mainMod SHIFT, J, resize down (+50), resizeactive, 0 50
binded = $mainMod SHIFT, K, resize up (-50), resizeactive, 0 -50
binded = $mainMod SHIFT, L, resize right (+50), resizeactive, 50 0
