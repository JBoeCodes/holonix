# User keybinds for jboe's desktop

$mainMod = SUPER
$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts
$UserConfigs = $HOME/.config/hypr/UserConfigs

# Override default browser bind to use Vivaldi directly
unbind = $mainMod, B, open default browser, exec, xdg-open "https://"
bindd = $mainMod, B, open Vivaldi, exec, vivaldi

# 1Password Quick Access
bindd = CTRL SHIFT, Space, 1Password Quick Access, exec, 1password --quick-access

# Dictation
bindd = $mainMod, D, dictation, exec, dictate

# Lazygit scratchpad
bindd = $mainMod, G, toggle lazygit scratchpad, togglespecialworkspace, lazygit

# Btop scratchpad (unbind default group toggle first)
unbind = $mainMod SHIFT, T
bindd = $mainMod SHIFT, T, toggle btop scratchpad, togglespecialworkspace, btop

# Lock screen
bindd = $mainMod, L, lock screen, exec, hyprlock
